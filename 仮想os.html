<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="google-site-verification" content="IglyE55YS_74AIvXtJlh_f7fEJ6HCk1fsPWa-CttFag" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS - Pro Web Enabled (Upload Support)</title>
    <style>
        :root { --bg: rgba(255, 255, 255, 0.85); --blur: blur(20px); --accent: #0078d4; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; user-select: none; }
        
        #boot { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.5s; }
        .spin { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #00a1f1; border-radius: 50%; width: 40px; height: 40px; animation: s 1s linear infinite; margin-top: 20px; }
        @keyframes s { 100% { transform: rotate(360deg); } }

        #wall { position: fixed; inset: 0; background: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1920') center/cover no-repeat; z-index: -1; transition: 0.3s ease; }
        
        #desk { width: 100vw; height: calc(100vh - 48px); padding: 10px; display: grid; grid-template-rows: repeat(auto-fill, 90px); grid-template-columns: repeat(auto-fill, 80px); grid-auto-flow: column; gap: 10px; align-content: start; }

        .icon { width: 75px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-size: 11px; text-shadow: 1px 1px 3px #000; cursor: pointer; border-radius: 4px; transition: 0.1s; text-align: center; }
        .icon:hover { background: rgba(255,255,255,0.2); }
        .icon span { font-size: 32px; margin-bottom: 4px; pointer-events: none; }

        .win { position: absolute; width: 650px; height: 480px; background: var(--bg); backdrop-filter: var(--blur); border-radius: 10px; box-shadow: 0 15px 45px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); z-index: 10; }
        .win-h { height: 35px; background: rgba(240,240,240,0.6); display: flex; justify-content: space-between; align-items: center; padding: 0 10px; cursor: move; font-size: 13px; font-weight: 500; }
        .win-b { flex: 1; overflow: auto; background: #fff; position: relative; }
        .win-c { display: flex; }
        .win-c span { width: 40px; text-align: center; cursor: pointer; line-height: 35px; font-family: monospace; font-size: 16px; }
        .win-c .x:hover { background: #e81123; color: #fff; }

        #bar { position: fixed; bottom: 0; width: 100%; height: 48px; background: rgba(243, 243, 243, 0.85); backdrop-filter: var(--blur); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .st-btn { font-size: 24px; cursor: pointer; padding: 0 15px; }

        #start { position: fixed; bottom: -700px; left: 50%; transform: translateX(-50%); width: 520px; height: 560px; background: rgba(248, 248, 248, 0.98); border-radius: 12px; transition: 0.3s cubic-bezier(0,1,0.5,1); z-index: 9998; padding: 30px; box-shadow: 0 0 40px rgba(0,0,0,0.3); }
        #start.open { bottom: 60px; }
        .s-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; height: 420px; overflow-y: auto; }

        .browser-bar { display: flex; padding: 6px; background: #eee; gap: 5px; }
        .browser-bar input { flex: 1; padding: 4px 10px; border-radius: 15px; border: 1px solid #ccc; outline: none; }
        .pad { padding: 15px; }
        .full { width: 100%; height: 100%; border: none; }
        .calc-btn { border: 1px solid #ddd; background: #fdfdfd; font-size: 20px; cursor: pointer; }
        .calc-btn:hover { background: #eee; }
        
        .store-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 15px; }
        .exp-row { display: flex; align-items: center; padding: 8px 15px; cursor: pointer; font-size: 13px; gap: 10px; }
        .exp-row:hover { background: #f0f7ff; }
        .uninst-btn { background: #ff4d4d; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .uninst-btn:hover { background: #cc0000; }
        
        .wall-upload { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* 追加: アップロード用ボタンのスタイル */
        .upload-area { padding: 10px; background: #f9f9f9; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
        .upload-label { background: #0078d4; color: #fff; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="boot">
    <svg width="60" height="60" viewBox="0 0 24 24"><path fill="#00a1f1" d="M0 0h11.5v11.5H0V0zm12.5 0H24v11.5H12.5V0zM0 12.5h11.5V24H0V12.5zm12.5 0H24V24H12.5V12.5z"/></svg>
    <div class="spin"></div>
</div>

<div id="wall"></div>
<div id="desk" oncontextmenu="return false;"></div>

<div id="bar">
    <div class="st-btn" onclick="tglStart()">💠</div>
    <div id="cl" style="position:absolute; right:15px; text-align:right; font-size:11px;">
        <div id="cl-t"></div><div id="cl-d"></div>
    </div>
</div>

<div id="start">
    <div style="font-size:13px; font-weight:bold; margin-bottom:15px;">ピン留め済み</div>
    <div class="s-grid" id="s-grid"></div>
    <div style="margin-top:20px; border-top:1px solid #ddd; padding-top:15px; text-align:right;">
        <button onclick="location.reload()">🔄 再起動</button>
    </div>
</div>

<script>
    const allApps = [
        { id:'edge', n:'Edge', i:'🌐', t:'web', u:'https://duckduckgo.com/?kae=d' },
        { id:'einstein', n:'アインストーン', i:'💎', t:'web', u:'https://ja.wikipedia.org/wiki/アルベルト_アインシュタイン' },
        { id:'store', n:'Store', i:'🛍️', t:'store' },
        { id:'pc', n:'PC', i:'📁', t:'explorer' },
        { id:'calc', n:'電卓', i:'🧮', t:'calc' },
        { id:'note', n:'メモ帳', i:'📝', t:'text' },
        { id:'paint', n:'ペイント', i:'🎨', t:'draw' },
        { id:'set', n:'設定', i:'⚙️', t:'settings' },
        { id:'mail', n:'メール', i:'📧', t:'html', c:'<div class="pad">メールはありません。</div>' },
        { id:'clock', n:'時計', i:'⏰', t:'clock' },
        { id:'calen', n:'予定', i:'📅', t:'html', c:'<div class="pad">2026年5月</div>' },
        { id:'news', n:'ニュース', i:'📰', t:'web', u:'https://wikipedia.org' },
        { id:'weather', n:'天気', i:'☀️', t:'web', u:'https://www.windy.com' },
        { id:'video', n:'Video', i:'🎬', t:'web', u:'https://www.youtube.com/embed' },
        { id:'cmd', n:'端末', i:'💻', t:'html', c:'<div class="full pad" style="background:#000;color:#0f0;font-family:monospace;">C:\\Users\\Admin>_</div>' },
        { id:'bin', n:'ごみ箱', i:'🗑️', t:'html', c:'<div class="pad">空です</div>' }
    ];

    let zIndex = 1000;
    let installedIds = JSON.parse(localStorage.getItem('my_apps')) || ['edge', 'einstein', 'store', 'pc', 'calc', 'set'];
    
    // 仮想ファイルシステム用
    let uploadedFiles = [];

    window.onload = () => {
        const savedWall = localStorage.getItem('my_wall');
        if (savedWall) document.getElementById('wall').style.backgroundImage = `url(${savedWall})`;
        setTimeout(() => document.getElementById('boot').style.display = 'none', 1200);
        renderDesktop();
        updateTime();
        setInterval(updateTime, 1000);
    };

    function renderDesktop() {
        const d = document.getElementById('desk'), s = document.getElementById('s-grid');
        d.innerHTML = ''; s.innerHTML = '';
        allApps.forEach(a => {
            if (installedIds.includes(a.id)) {
                const ic = createIcon(a);
                ic.ondblclick = () => openWin(a.id);
                d.appendChild(ic);
                const si = createIcon(a);
                si.style.color = '#333'; si.style.textShadow = 'none';
                si.onclick = () => { openWin(a.id); tglStart(); };
                s.appendChild(si);
            }
        });
    }

    function createIcon(a) {
        const div = document.createElement('div');
        div.className = 'icon';
        div.innerHTML = `<span>${a.i}</span>${a.n}`;
        return div;
    }

    function openWin(id) {
        const a = allApps.find(x => x.id === id);
        if (document.getElementById('win-' + id)) {
            const existing = document.getElementById('win-' + id);
            existing.style.display = 'flex';
            existing.style.zIndex = ++zIndex;
            return;
        }

        const win = document.createElement('div');
        win.className = 'win'; win.id = 'win-' + id;
        win.style.top = (60 + Math.random() * 40) + 'px';
        win.style.left = (100 + Math.random() * 100) + 'px';
        win.style.zIndex = ++zIndex;
        
        win.innerHTML = `
            <div class="win-h" onpointerdown="dragWin(event, '${id}')">
                <div>${a.i} ${a.n}</div>
                <div class="win-c">
                    <span onclick="document.getElementById('win-${id}').style.display='none'">－</span>
                    <span class="x" onclick="document.getElementById('win-${id}').remove()">×</span>
                </div>
            </div>
            <div class="win-b"></div>
        `;
        document.body.appendChild(win);
        const body = win.querySelector('.win-b');

        if (a.t === 'web') {
            body.innerHTML = `<div class="browser-bar"><input id="in-${id}" value="${a.u}"><button onclick="navigate('${id}')">Go</button></div>
                <iframe id="if-${id}" src="${a.u}" class="full" style="height:calc(100% - 38px);"></iframe>`;
        } else if (a.t === 'explorer') {
            renderExplorer(body);
        } else if (a.t === 'calc') {
            initCalc(body);
        } else if (a.t === 'text') {
            body.innerHTML = `<textarea class="full pad" style="outline:none; resize:none; border:none;">テキストを入力...</textarea>`;
        } else if (a.t === 'store') {
            renderStore(body);
        } else if (a.t === 'settings') {
            body.innerHTML = `<div class="pad"><h3>設定</h3><div class="wall-upload" onclick="document.getElementById('wall-input').click()">📁 壁紙変更<input type="file" id="wall-input" style="display:none" accept="image/*" onchange="uploadWall(event)"></div><button onclick="localStorage.clear();location.reload()" style="color:red;margin-top:20px;">初期化</button></div>`;
        } else if (a.t === 'clock') {
            setInterval(() => { if(body) body.innerHTML = `<div class="pad" style="font-size:40px; text-align:center; margin-top:100px;">${new Date().toLocaleTimeString()}</div>` }, 1000);
        } else {
            body.innerHTML = a.c || 'Content';
        }
    }

    // エクスプローラー描画機能の拡張
    function renderExplorer(b) {
        b.innerHTML = `
            <div class="upload-area">
                <label class="upload-label">
                    ＋ ファイルをアップロード
                    <input type="file" style="display:none" onchange="handleFileUpload(event, this)">
                </label>
                <span style="font-size:11px; color:#666;">C:\\Users\\Admin\\Documents</span>
            </div>
            <div class="exp-list" style="overflow-y:auto; height:calc(100% - 45px);">
                <div class="exp-row">📁 Documents</div>
                <div class="exp-row">📁 Downloads</div>
                <div class="exp-row">📁 Pictures</div>
                <div class="exp-row">📄 system_log.txt</div>
                <div id="custom-files"></div>
            </div>
        `;
        updateFileList();
    }

    // ファイルアップロード処理
    window.handleFileUpload = (e, input) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            uploadedFiles.push({
                name: file.name,
                type: file.type,
                data: ev.target.result,
                icon: file.type.startsWith('image/') ? '🖼️' : '📄'
            });
            updateFileList();
            input.value = ''; // Reset input
        };
        reader.readAsDataURL(file);
    };

    // ファイル一覧の更新
    function updateFileList() {
        const container = document.getElementById('custom-files');
        if (!container) return;
        
        container.innerHTML = uploadedFiles.map((f, index) => `
            <div class="exp-row" ondblclick="viewFile(${index})">
                ${f.icon} ${f.name}
            </div>
        `).join('');
    }

    // ファイルプレビュー
    window.viewFile = (index) => {
        const f = uploadedFiles[index];
        const previewWin = document.createElement('div');
        previewWin.className = 'win';
        previewWin.style.width = '400px'; previewWin.style.height = '400px';
        previewWin.style.top = '100px'; previewWin.style.left = '150px';
        previewWin.style.zIndex = ++zIndex;
        
        let content = '';
        if (f.type.startsWith('image/')) {
            content = `<img src="${f.data}" style="max-width:100%; max-height:100%; display:block; margin:auto;">`;
        } else {
            content = `<div class="pad" style="word-break:break-all;">${f.name}<br><hr><small>${f.data.substring(0, 500)}...</small></div>`;
        }

        previewWin.innerHTML = `
            <div class="win-h">
                <div>プレビュー: ${f.name}</div>
                <div class="win-c"><span class="x" onclick="this.closest('.win').remove()">×</span></div>
            </div>
            <div class="win-b" style="display:flex; align-items:center; justify-content:center; background:#333; color:#fff;">${content}</div>
        `;
        document.body.appendChild(previewWin);
    };

    function renderStore(b) {
        let html = '<div class="pad"><h3>Microsoft Store</h3>';
        allApps.forEach(a => {
            const isInstalled = installedIds.includes(a.id);
            html += `<div class="store-item">
                <span>${a.i}</span><div style="flex:1"><b>${a.n}</b></div>
                ${isInstalled ? 
                    `<button class="uninst-btn" onclick="uninstallApp('${a.id}')">アンインストール</button>` : 
                    `<button onclick="installApp('${a.id}')">インストール</button>`
                }
            </div>`;
        });
        b.innerHTML = html + '</div>';
    }

    window.installApp = (id) => {
        if (!installedIds.includes(id)) {
            installedIds.push(id);
            saveApps();
            renderDesktop();
            refreshStore();
        }
    };

    window.uninstallApp = (id) => {
        if (['store', 'set', 'pc'].includes(id)) {
            alert('このシステムアプリは削除できません');
            return;
        }
        installedIds = installedIds.filter(appId => appId !== id);
        saveApps();
        renderDesktop();
        const win = document.getElementById('win-' + id);
        if (win) win.remove();
        refreshStore();
    };

    function saveApps() { localStorage.setItem('my_apps', JSON.stringify(installedIds)); }
    
    function refreshStore() {
        const storeBody = document.querySelector('#win-store .win-b');
        if(storeBody) renderStore(storeBody);
    }

    function navigate(id) {
        let url = document.getElementById('in-' + id).value;
        if (!url.startsWith('http')) url = 'https://' + url;
        document.getElementById('if-' + id).src = url;
    }

    function initCalc(b) {
        b.innerHTML = `<div id="disp" style="height:50px; font-size:30px; text-align:right; padding:10px; background:#eee;">0</div><div style="display:grid; grid-template-columns:repeat(4,1fr); height:calc(100% - 70px);">${"789/456*123-C0=+=".split('').map(k => `<button class="calc-btn" onclick="doCalc('${k}')">${k}</button>`).join('')}</div>`;
    }

    window.doCalc = (k) => {
        const d = document.getElementById('disp');
        if (k === 'C') d.innerText = "0";
        else if (k === '=') { try { d.innerText = eval(d.innerText); } catch { d.innerText = "Error"; } }
        else { d.innerText = d.innerText === "0" ? k : d.innerText + k; }
    };

    function dragWin(e, id) {
        const el = document.getElementById('win-' + id);
        el.style.zIndex = ++zIndex;
        const shiftX = e.clientX - el.getBoundingClientRect().left;
        const shiftY = e.clientY - el.getBoundingClientRect().top;
        el.setPointerCapture(e.pointerId);
        el.onpointermove = (ev) => {
            el.style.left = (ev.clientX - shiftX) + 'px';
            el.style.top = (ev.clientY - shiftY) + 'px';
        };
        el.onpointerup = () => { el.onpointermove = null; el.releasePointerCapture(e.pointerId); };
    }

    function tglStart() { document.getElementById('start').classList.toggle('open'); }
    function updateTime() {
        const d = new Date();
        document.getElementById('cl-t').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('cl-d').innerText = d.toLocaleDateString();
    }
    
    window.uploadWall = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('wall').style.backgroundImage = `url(${ev.target.result})`;
            localStorage.setItem('my_wall', ev.target.result);
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
